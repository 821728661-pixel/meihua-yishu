<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>二字起卦 · 梅花易数</title>
<script src="https://cdn.jsdelivr.net/npm/cnchar/cnchar.min.js"></script>
<script src="judgments.js"></script>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Noto Serif SC", "STSong", serif;
    background: #f5f0e8;
    color: #3d3229;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px 12px 60px;
  }
  .container {
    max-width: 520px;
    width: 100%;
  }

  /* ===== Header ===== */
  .header {
    text-align: center;
    padding: 32px 0 24px;
    border-bottom: 2px solid #d4c5b0;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #5c3d2e;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.6);
  }
  .header .sub {
    font-size: 13px;
    color: #8a7a6a;
    margin-top: 6px;
    letter-spacing: 2px;
  }

  /* ===== Card ===== */
  .card {
    background: #fffcf7;
    border-radius: 12px;
    padding: 24px 20px;
    box-shadow: 0 2px 12px rgba(60,45,35,0.08);
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: #7a6a5a;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid #ede6dc;
    letter-spacing: 1px;
  }

  /* ===== Input Area ===== */
  .input-group {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input-group input {
    flex: 1;
    padding: 12px 14px;
    border: 2px solid #ddd2c4;
    border-radius: 8px;
    font-size: 18px;
    font-family: inherit;
    background: #fefcf9;
    color: #3d3229;
    outline: none;
    transition: border-color .25s;
    letter-spacing: 4px;
    text-align: center;
  }
  .input-group input:focus {
    border-color: #b8a088;
  }
  .input-group input::placeholder {
    font-size: 14px;
    letter-spacing: 1px;
    color: #c4b8aa;
  }
  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    background: #8b6f50;
    color: #fff;
    letter-spacing: 4px;
    white-space: nowrap;
  }
  .btn:hover { background: #7a5e42; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled {
    background: #c4b8aa;
    cursor: not-allowed;
    transform: none;
  }

  .error-msg {
    color: #c0392b;
    font-size: 13px;
    margin-top: 10px;
    min-height: 20px;
  }

  /* ===== Result ===== */
  .result-area { display: none; }
  .result-area.show { display: block; }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 16px;
    margin-bottom: 16px;
  }
  .result-item {
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px dashed #ede6dc;
  }
  .result-item .label {
    color: #8a7a6a;
    font-size: 12px;
  }
  .result-item .value {
    font-size: 16px;
    font-weight: 600;
    margin-top: 2px;
    color: #3d3229;
  }
  .result-item .value .tag {
    display: inline-block;
    background: #f0e8de;
    padding: 1px 10px;
    border-radius: 4px;
    font-size: 13px;
    margin-left: 6px;
    color: #6a5a4a;
  }

  .yao-section-title {
    font-size: 14px;
    font-weight: 600;
    color: #5c4a3a;
    margin: 18px 0 10px;
    text-align: center;
    letter-spacing: 2px;
  }

  /* ===== Yao Diagram (六爻图) ===== */
  .yao-diagram {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 12px 0;
  }
  .yao-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .yao-line {
    display: block;
    height: 6px;
    border-radius: 3px;
    background: #5c4a3a;
  }
  .yao-line.yang {
    width: 160px;
  }
  .yao-line.yin {
    width: 160px;
    background: transparent;
    border-top: 2px solid #5c4a3a;
    border-bottom: 2px solid #5c4a3a;
    height: 2px;
    border-radius: 0;
  }
  .yao-label {
    font-size: 11px;
    color: #8a7a6a;
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }
  .yao-active .yao-label {
    color: #c0392b;
    font-weight: 700;
  }
  .yao-active .yao-line.yang {
    background: #c0392b;
  }
  .yao-active .yao-line.yin {
    border-color: #c0392b;
  }

  /* ===== Judgment ===== */
  .judgment-box {
    margin-top: 16px;
    padding: 16px 18px;
    background: #f8f2ea;
    border-radius: 8px;
    border-left: 3px solid #b8a088;
  }
  .judgment-box .label {
    font-size: 12px;
    color: #8a7a6a;
    letter-spacing: 1px;
  }
  .judgment-box .text {
    font-size: 15px;
    line-height: 1.7;
    margin-top: 6px;
    color: #4d3a2a;
  }

  /* ===== Loading ===== */
  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #ddd2c4;
    border-top-color: #8b6f50;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Responsive ===== */
  @media (max-width: 420px) {
    .header h1 { font-size: 26px; letter-spacing: 6px; }
    .input-group { flex-direction: column; }
    .input-group input { width: 100%; font-size: 16px; }
    .btn { width: 100%; }
    .result-grid { grid-template-columns: 1fr; }
    .yao-line.yang, .yao-line.yin { width: 120px; }
    .card { padding: 18px 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ===== Header ===== -->
  <div class="header">
    <h1>二字起卦</h1>
    <div class="sub">梅 花 易 数 · 随 心 而 占</div>
  </div>

  <!-- ===== Input Card ===== -->
  <div class="card">
    <div class="card-title">✦ 输入二字</div>
    <div class="input-group">
      <input type="text" id="charInput" placeholder="请输入两个汉字" autocomplete="off">
      <button class="btn" id="submitBtn">起卦</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- ===== Result Card ===== -->
  <div class="card result-area" id="resultArea">
    <div class="card-title">✦ 本次起卦结果</div>

    <!-- Info Grid -->
    <div class="result-grid" id="resultGrid"></div>

    <!-- Hexagram Diagram -->
    <div class="yao-section-title">▎本卦 · <span id="originalName"></span></div>
    <div class="yao-diagram" id="originalYao"></div>

    <!-- Judgment -->
    <div class="judgment-box" id="judgmentBox">
      <div class="label" id="judgmentLabel">爻辞</div>
      <div class="text" id="judgmentText"></div>
    </div>
  </div>

</div>

<script>
// ============================================================
//  1. 八卦数据
// ============================================================
const TRIGRAM = {
  1: { name: '乾', symbol: '☰', nature: '天', lines: [1,1,1] },
  2: { name: '兑', symbol: '☱', nature: '泽', lines: [1,1,0] },
  3: { name: '离', symbol: '☲', nature: '火', lines: [1,0,1] },
  4: { name: '震', symbol: '☳', nature: '雷', lines: [1,0,0] },
  5: { name: '巽', symbol: '☴', nature: '风', lines: [0,1,1] },
  6: { name: '坎', symbol: '☵', nature: '水', lines: [0,1,0] },
  7: { name: '艮', symbol: '☶', nature: '山', lines: [0,0,1] },
  8: { name: '坤', symbol: '☷', nature: '地', lines: [0,0,0] },
};

const YAO_NAMES = ['初爻', '二爻', '三爻', '四爻', '五爻', '上爻'];

// ============================================================
//  2. 六十四卦数据
//     键名格式: "上卦数字下卦数字"，如 "67" 表示上坎下艮
// ============================================================
const HEXAGRAM_DATA = {
  // ── 乾为天 (上乾下乾) ──
  "11": { name: "乾为天" },
  "12": { name: "天泽履" },
  "13": { name: "天火同人" },
  "14": { name: "天雷无妄" },
  "15": { name: "天风姤" },
  "16": { name: "天水讼" },
  "17": { name: "天山遁" },
  "18": { name: "天地否" },
  // ── 兑宫 ──
  "21": { name: "泽天夬" },
  "22": { name: "兑为泽" },
  "23": { name: "泽火革" },
  "24": { name: "泽雷随" },
  "25": { name: "泽风大过" },
  "26": { name: "泽水困" },
  "27": { name: "泽山咸" },
  "28": { name: "泽地萃" },
  // ── 离宫 ──
  "31": { name: "火天大有" },
  "32": { name: "火泽睽" },
  "33": { name: "离为火" },
  "34": { name: "火雷噬嗑" },
  "35": { name: "火风鼎" },
  "36": { name: "火水未济" },
  "37": { name: "火山旅" },
  "38": { name: "火地晋" },
  // ── 震宫 ──
  "41": { name: "雷天大壮" },
  "42": { name: "雷泽归妹" },
  "43": { name: "雷火丰" },
  "44": { name: "震为雷" },
  "45": { name: "雷风恒" },
  "46": { name: "雷水解" },
  "47": { name: "雷山小过" },
  "48": { name: "雷地豫" },
  // ── 巽宫 ──
  "51": { name: "风天小畜" },
  "52": { name: "风泽中孚" },
  "53": { name: "风火家人" },
  "54": { name: "风雷益" },
  "55": { name: "巽为风" },
  "56": { name: "风水涣" },
  "57": { name: "风山渐" },
  "58": { name: "风地观" },
  // ── 坎宫 ──
  "61": { name: "水天需" },
  "62": { name: "水泽节" },
  "63": { name: "水火既济" },
  "64": { name: "水雷屯" },
  "65": { name: "水风井" },
  "66": { name: "坎为水" },
  "67": { name: "水山蹇" },
  "68": { name: "水地比" },
  // ── 艮宫 ──
  "71": { name: "山天大畜" },
  "72": { name: "山泽损" },
  "73": { name: "山火贲" },
  "74": { name: "山雷颐" },
  "75": { name: "山风蛊" },
  "76": { name: "山水蒙" },
  "77": { name: "艮为山" },
  "78": { name: "山地剥" },
  // ── 坤宫 ──
  "81": { name: "地天泰" },
  "82": { name: "地泽临" },
  "83": { name: "地火明夷" },
  "84": { name: "地雷复" },
  "85": { name: "地风升" },
  "86": { name: "地水师" },
  "87": { name: "地山谦" },
  "88": { name: "坤为地" },
};

// ============================================================
//  3. 笔画 → 卦数 映射
// ============================================================
function strokeToTrigram(strokes) {
  if (strokes <= 0) return 0;
  if (strokes <= 8) return strokes;
  const r = strokes % 8;
  return r === 0 ? 8 : r;
}

// ============================================================
//  4. 构建六爻
// ============================================================
function buildHexagramLines(upperNum, lowerNum) {
  const upper = TRIGRAM[upperNum];
  const lower = TRIGRAM[lowerNum];
  if (!upper || !lower) return [];
  // 自下而上：初爻(0) → 上爻(5)
  return [
    ...lower.lines,  // 0,1,2 → 初、二、三
    ...upper.lines,  // 3,4,5 → 四、五、上
  ];
}

// ============================================================
//  5. 渲染六爻图
// ============================================================
function renderYao(containerId, lines, activeIndex) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  // 自下而上渲染
  for (let i = 5; i >= 0; i--) {
    const isActive = (i === activeIndex);
    const row = document.createElement('div');
    row.className = 'yao-row' + (isActive ? ' yao-active' : '');

    const label = document.createElement('span');
    label.className = 'yao-label';
    label.textContent = YAO_NAMES[i];
    row.appendChild(label);

    const line = document.createElement('span');
    line.className = 'yao-line ' + (lines[i] === 1 ? 'yang' : 'yin');
    row.appendChild(line);

    container.appendChild(row);
  }
}

// ============================================================
//  6. 主逻辑：起卦
// ============================================================
function performDivination(text) {
  // 校验
  text = text.trim();
  if (text.length !== 2) {
    return { error: '请输入两个汉字，不能多也不能少。' };
  }

  // 获取笔画
  const stroke1 = cnchar.stroke(text[0]);
  const stroke2 = cnchar.stroke(text[1]);

  if (stroke1 === 0 || stroke2 === 0 || stroke1 === undefined || stroke2 === undefined) {
    return { error: '暂不支持该字符，请替换其他汉字。' };
  }

  // 转卦数
  const num1 = strokeToTrigram(stroke1);
  const num2 = strokeToTrigram(stroke2);

  // 第一个字 → 下卦(内卦), 第二个字 → 上卦(外卦)
  const lowerNum = num1;
  const upperNum = num2;

  const lowerTri = TRIGRAM[lowerNum];
  const upperTri = TRIGRAM[upperNum];

  // 六十四卦键名: 上卦数字 + 下卦数字
  const key = '' + upperNum + lowerNum;
  const hexagram = HEXAGRAM_DATA[key];
  if (!hexagram) {
    return { error: '未找到对应卦象，请检查输入。' };
  }

  // 动爻
  const total = stroke1 + stroke2;
  const yaoRaw = total % 6;  // 0~5
  const yaoIndex = yaoRaw === 0 ? 5 : yaoRaw - 1; // 转为数组索引: 余数1→初爻(0), 余数0→上爻(5)
  const yaoDisplay = yaoRaw === 0 ? '上爻' : YAO_NAMES[yaoRaw - 1];

  // 本卦六爻
  const originalLines = buildHexagramLines(upperNum, lowerNum);

  return {
    text,
    stroke1,
    stroke2,
    num1,
    num2,
    lowerNum,
    upperNum,
    lowerName: lowerTri.name + '(' + lowerTri.nature + ')',
    upperName: upperTri.name + '(' + upperTri.nature + ')',
    hexagram,
    key,
    yaoDisplay,
    yaoIndex,
    total,
    originalLines,
    upperTri,
    lowerTri,
  };
}

// ============================================================
//  7. DOM 渲染
// ============================================================
function displayResult(result) {
  const errorEl = document.getElementById('errorMsg');
  const resultArea = document.getElementById('resultArea');

  if (result.error) {
    errorEl.textContent = result.error;
    resultArea.classList.remove('show');
    return;
  }

  errorEl.textContent = '';
  resultArea.classList.add('show');

  // 信息表格
  const grid = document.getElementById('resultGrid');
  grid.innerHTML = `
    <div class="result-item">
      <div class="label">第一字</div>
      <div class="value">${result.text[0]} <span class="tag">${result.stroke1}画</span></div>
    </div>
    <div class="result-item">
      <div class="label">第二字</div>
      <div class="value">${result.text[1]} <span class="tag">${result.stroke2}画</span></div>
    </div>
    <div class="result-item">
      <div class="label">总笔画</div>
      <div class="value">${result.total} <span class="tag">动爻：${result.yaoDisplay}</span></div>
    </div>
    <div class="result-item">
      <div class="label">下卦（内卦）</div>
      <div class="value">${result.lowerName}</div>
    </div>
    <div class="result-item">
      <div class="label">上卦（外卦）</div>
      <div class="value">${result.upperName}</div>
    </div>
    <div class="result-item">
      <div class="label">本卦</div>
      <div class="value">${result.hexagram.name}</div>
    </div>
  `;

  // 卦名
  document.getElementById('originalName').textContent = result.hexagram.name;

  // 六爻图
  renderYao('originalYao', result.originalLines, result.yaoIndex);

  // 断语
  const yaos = JUDGMENTS[result.key];
  if (yaos) {
    document.getElementById('judgmentLabel').textContent = '▎' + YAO_NAMES[result.yaoIndex] + '动 · 断语';
    document.getElementById('judgmentText').textContent = yaos[result.yaoIndex];
  } else {
    document.getElementById('judgmentLabel').textContent = '爻辞';
    document.getElementById('judgmentText').textContent = '暂无断语。';
  }
}

// ============================================================
//  8. 事件绑定
// ============================================================
const inputEl = document.getElementById('charInput');
const btn = document.getElementById('submitBtn');

function handleSubmit() {
  const val = inputEl.value;
  if (!val || val.trim().length === 0) {
    document.getElementById('errorMsg').textContent = '请输入两个汉字。';
    document.getElementById('resultArea').classList.remove('show');
    return;
  }
  // 加载动画
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>起卦';

  // 微延迟，让 UI 响应
  setTimeout(() => {
    const result = performDivination(val);
    displayResult(result);
    btn.disabled = false;
    btn.textContent = '起卦';
  }, 300);
}

btn.addEventListener('click', handleSubmit);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSubmit();
});

// 输入时自动清除错误
inputEl.addEventListener('input', (e) => {
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('resultArea').classList.remove('show');
});

// 输入法完成后再限制字数，不打断拼音输入
let isComposing = false;
inputEl.addEventListener('compositionstart', () => { isComposing = true; });
inputEl.addEventListener('compositionend', function() {
  isComposing = false;
  if (this.value.length > 2) this.value = this.value.slice(0, 2);
});
inputEl.addEventListener('input', function() {
  if (!isComposing && this.value.length > 2) {
    this.value = this.value.slice(0, 2);
  }
});
</script>
</body>
</html>
